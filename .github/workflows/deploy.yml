name: Deploy to EC2 via SSM

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::218549829591:role/github-actions-deploy-role
          aws-region: eu-central-1

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-0dc16145b15abf803" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu/app","git pull origin main","docker compose down","docker compose up -d --build"]' \
            --query "Command.CommandId" \
            --output text
