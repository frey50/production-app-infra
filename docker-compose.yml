version: '3.8'
services:
  nginx:
    image: nginx:alpine
    container_name: production_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: production_backend
    environment:
      - PORT=8080
      - DB_HOST=postgres_db
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecretpassword
      - POSTGRES_DB=app_data
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:latest
    container_name: production_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    container_name: production_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=changeme123
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - app_network

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  app_network:
    driver: bridge